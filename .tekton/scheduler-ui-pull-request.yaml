apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/scheduler-ui?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "master"
    pipelinesascode.tekton.dev/pipeline: https://github.com/RedHatInsights/konflux-pipelines/raw/main/pipelines/platform-ui/docker-build-run-all-tests.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: scheduler-ui
    appstudio.openshift.io/component: scheduler-ui
    pipelines.appstudio.openshift.io/type: build
  name: scheduler-ui-on-pull-request
  namespace: hcc-platex-services-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/hcc-platex-services-tenant/hcc-platex-services/scheduler-ui:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: build-tools/Dockerfile
  - name: path-context
    value: .
  - name: workspace-setup-script
    value: |
      #!/bin/bash
      set -ex
      # Install npm dependencies (including Playwright)
      npm ci
      # Note: Playwright browsers are pre-installed in the playwright image
      # when the image version matches package.json version
  - name: unit-tests-script
    value: |
      #!/bin/bash
      set -ex
      npm run lint
      npm test -- --runInBand --no-cache
  - name: e2e-tests-script
    value: |
      #!/bin/bash
      set -ex
      # Debug: Show environment variables
      echo "=== E2E Test Environment ==="
      echo "PLAYWRIGHT_BASE_URL: ${PLAYWRIGHT_BASE_URL:-NOT SET}"
      echo "HCC_ENV_URL: ${HCC_ENV_URL:-NOT SET}"
      echo "E2E_USER: ${E2E_USER:-NOT SET}"
      echo "PWD: $(pwd)"
      echo "==========================="

      # Run Playwright tests with verbose output
      npx playwright test --reporter=list
  - name: run-app-script
    value: |
      #!/bin/bash
      set -ex
      # Start Caddy to serve app assets
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
  - name: e2e-playwright-image
    value: "mcr.microsoft.com/playwright:v1.59.1-jammy"
  - name: frontend-proxy-routes-configmap
    value: "scheduler-ui-dev-proxy-caddyfile"
  - name: e2e-credentials-secret
    value: "scheduler-ui-credentials-secret"
  - name: e2e-app-port
    value: "8000"
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: https://github.com/RedHatInsights/konflux-pipelines
      - name: revision
        value: main
      - name: pathInRepo
        value: pipelines/platform-ui/docker-build-run-all-tests.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-scheduler-ui
  workspaces:
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp: null
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 3Gi
      status: {}
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
