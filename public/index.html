<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Scheduler | Red Hat Hybrid Cloud Console</title>
    <!-- PatternFly CSS is loaded via webpack (AppEntry imports base.css) -->
</head>
<body>
    <!-- Root div where React will mount -->
    <div id="root"></div>

    <!-- Load React, ReactDOM, and React Router from local vendor copies.
         These are copied from node_modules during postbuild so the dev harness
         works offline and in CI environments without internet access. -->
    <script src="/apps/scheduler-ui/vendor/react.production.min.js"></script>
    <script src="/apps/scheduler-ui/vendor/react-dom.production.min.js"></script>
    <script src="/apps/scheduler-ui/vendor/react-router-dom.production.min.js"></script>

    <!-- Bootstrap script to load and render the app -->
    <script>
        // Shim for the module federation callback registration used by fec build.
        // In production, insights-chrome provides __load_plugin_entry__. For
        // standalone / E2E usage we register the container on window ourselves.
        window.__load_plugin_entry__ = function(name, container) {
            window[name] = container;
        };

        // Build a webpack 5 share scope entry for a UMD global.
        // The entry shape is { <version>: { get, from, loaded } }.
        function shareEntry(version, getter) {
            var entry = {};
            entry[version] = {
                get: function() { return Promise.resolve(getter); },
                from: 'standalone',
                loaded: 1
            };
            return entry;
        }

        // jsx-runtime re-export from React UMD — React 18 UMD exposes
        // jsx/jsxs/Fragment on the React global under __SECRET_INTERNALS.
        // The bundled jsx-runtime falls back to React.createElement anyway,
        // so providing the React UMD module is sufficient.
        function getJsxRuntime() {
            var R = window.React;
            return {
                jsx: R.createElement,
                jsxs: R.createElement,
                Fragment: R.Fragment
            };
        }

        (async function() {
            try {
                // First, load the fed-mods.json manifest to get the correct script filename
                var manifest = await fetch('/apps/scheduler-ui/fed-mods.json').then(function(r) { return r.json(); });
                console.log('Manifest loaded:', manifest);

                // Get the script filename from the manifest
                var scriptFiles = manifest.loadScripts || [];
                if (scriptFiles.length === 0) {
                    throw new Error('No scripts found in fed-mods.json');
                }

                // Create and load the main app script
                var appScript = document.createElement('script');
                appScript.src = '/apps/scheduler-ui/' + scriptFiles[0];
                console.log('Loading script:', appScript.src);

                appScript.onload = async function() {
                    console.log('Script loaded, initializing module federation...');
                    if (window.schedulerUi && window.schedulerUi.init) {
                        // Provide shared deps via the webpack 5 module federation
                        // share scope. Format: { moduleName: { version: { get, from, loaded } } }.
                        var shareScope = {
                            'react':           shareEntry('18.3.1', function() { return window.React; }),
                            'react-dom':       shareEntry('18.3.1', function() { return window.ReactDOM; }),
                            'react-router-dom': shareEntry('6.30.3', function() { return window.ReactRouterDOM; }),
                            'react/jsx-runtime': shareEntry('18.3.1', getJsxRuntime)
                        };
                        await window.schedulerUi.init(shareScope);

                        console.log('Module federation initialized, loading RootApp...');
                        var mod = await window.schedulerUi.get('./RootApp');
                        var AppEntry = mod.default || mod;

                        console.log('RootApp loaded, rendering...');
                        // Wrap in BrowserRouter for standalone use — in production
                        // insights-chrome provides the Router context.
                        var rootEl = document.getElementById('root');
                        var root = window.ReactDOM.createRoot(rootEl);
                        root.render(
                            window.React.createElement(
                                window.ReactRouterDOM.BrowserRouter,
                                { basename: '/apps/scheduler-ui' },
                                window.React.createElement(AppEntry)
                            )
                        );

                        console.log('App loaded successfully!');
                    } else {
                        console.error('Module federation container not found');
                        document.getElementById('root').innerHTML = '<h1>Error: Module federation container not found</h1>';
                    }
                };
                appScript.onerror = function() {
                    console.error('Failed to load app script');
                    document.getElementById('root').innerHTML = '<h1>Failed to load application</h1>';
                };
                document.head.appendChild(appScript);
            } catch (error) {
                console.error('Error loading app:', error);
                document.getElementById('root').innerHTML = '<h1>Error: ' + error.message + '</h1>';
            }
        })();
    </script>
</body>
</html>
