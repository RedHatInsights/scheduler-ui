<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Scheduler | Red Hat Hybrid Cloud Console</title>
    <!-- PatternFly CSS - needed for styling -->
    <link rel="stylesheet" href="https://unpkg.com/@patternfly/patternfly@5.4.0/patternfly.min.css">
</head>
<body>
    <!-- Root div where React will mount -->
    <div id="root"></div>

    <!-- Load React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-router-dom@6.20.0/dist/umd/react-router-dom.production.min.js"></script>

    <!-- Bootstrap script to load and render the app -->
    <script>
        (async function() {
            try {
                // First, load the fed-mods.json manifest to get the correct script filename
                const manifest = await fetch('/apps/scheduler-ui/fed-mods.json').then(r => r.json());
                console.log('Manifest loaded:', manifest);

                // Get the script filename from the manifest
                const scriptFiles = manifest.loadScripts || [];
                if (scriptFiles.length === 0) {
                    throw new Error('No scripts found in fed-mods.json');
                }

                // Create and load the main app script
                const script = document.createElement('script');
                script.src = '/apps/scheduler-ui/' + scriptFiles[0];
                console.log('Loading script:', script.src);

                script.onload = async function() {
                    console.log('Script loaded, initializing module federation...');
                    // Initialize the module federation container
                    if (window.schedulerUi && window.schedulerUi.init) {
                        await window.schedulerUi.init({
                            react: {
                                get: () => Promise.resolve(() => window.React)
                            },
                            'react-dom': {
                                get: () => Promise.resolve(() => window.ReactDOM)
                            },
                            'react-router-dom': {
                                get: () => Promise.resolve(() => window.ReactRouterDOM)
                            }
                        });

                        console.log('Module federation initialized, loading RootApp...');
                        // Get the root app component
                        const { default: AppEntry } = await window.schedulerUi.get('./RootApp');

                        console.log('RootApp loaded, rendering...');
                        // Render the app
                        const container = document.getElementById('root');
                        const root = window.ReactDOM.createRoot(container);
                        root.render(window.React.createElement(AppEntry));

                        console.log('App loaded successfully!');
                    } else {
                        console.error('Module federation container not found');
                        document.getElementById('root').innerHTML = '<h1>Error: Module federation container not found</h1>';
                    }
                };
                script.onerror = function() {
                    console.error('Failed to load app script');
                    document.getElementById('root').innerHTML = '<h1>Failed to load application</h1>';
                };
                document.head.appendChild(script);
            } catch (error) {
                console.error('Error loading app:', error);
                document.getElementById('root').innerHTML = '<h1>Error: ' + error.message + '</h1>';
            }
        })();
    </script>
</body>
</html>
